name: Deploy BCS Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bcs-frontend-production
  cancel-in-progress: true

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build
        env:
          VITE_VWORLD_KEY: ${{ secrets.VITE_VWORLD_KEY }}

      - name: Prepare Frontend Deploy Directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: inwoo
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            BASE_DIR=/home/inwoo/docker/main/bcs/frontend
            rm -rf "$BASE_DIR/deploy"
            mkdir -p "$BASE_DIR/deploy"

      - name: Upload Frontend Build
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: inwoo
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/*"
          target: "/home/inwoo/docker/main/bcs/frontend/deploy"
          strip_components: 1

      - name: Activate Frontend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: inwoo
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            BASE_DIR=/home/inwoo/docker/main/bcs/frontend
            DEPLOY_DIR=$BASE_DIR/deploy
            DIST_DIR=$BASE_DIR/dist
            BACKUP_DIR=$BASE_DIR/dist-backup

            test -f "$DEPLOY_DIR/index.html"
            rm -rf "$BACKUP_DIR"

            if [ -d "$DIST_DIR" ]; then
              mv "$DIST_DIR" "$BACKUP_DIR"
            fi

            mv "$DEPLOY_DIR" "$DIST_DIR"
            rm -rf "$BACKUP_DIR"
